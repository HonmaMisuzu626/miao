<a href="../index.html" style="position:fixed; top:20px; left:20px; z-index:9999; color:#999; background:white; border:1px solid #EEE; padding:8px 15px; border-radius:20px; text-decoration:none; font-size:13px; font-family:sans-serif;">← 返回菜单</a><!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>葬送的举旗 - 原生音频优化版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #FDFDFD; touch-action: none; font-family: sans-serif; user-select: none; -webkit-user-select: none; }
    </style>
</head>
<body>
    <audio id="game_bgm" src="bgm.mp3" loop preload="auto"></audio>

<script>
let gameState = 0; 
let score = 0, bestScore = 0, timeLeft = 30 * 60;
let cpuL = true, cpuR = true, pL = true, pR = true;     
let aL = 1, aR = 1, pAL = 1, pAR = 1; 

const palette = {
    frieren: { hair: '#EEEEEE', skin: '#FFF0E5', robe: '#FFFFFF', gold: '#D4AF37', red: '#CC3333' },
    fern: { hair: '#4E3B66', skin: '#FFF5EE', robe: '#2A2A2A', white: '#FFFFFF' },
    flagY: '#FFCC00', flagO: '#FF5500', shadow: 'rgba(0,0,0,0.1)'
};

function setup() {
    createCanvas(windowWidth, windowHeight);
    rectMode(CENTER);
    let saved = localStorage.getItem('frieren_player_v9');
    if(saved) bestScore = parseInt(saved);
}

function draw() {
    background(252);

    // 逻辑：玩家是芙丽莲 (按下落旗)
    let isActive = mouseIsPressed;
    pL = !(isActive && mouseX < width / 2);
    pR = !(isActive && mouseX >= width / 2);
    if (touches.length > 0) {
        pL = true; pR = true;
        for (let t of touches) { if (t.x < width / 2) pL = false; else pR = false; }
    }

    let spd = 0.3;
    aL = lerp(aL, cpuL ? 1 : 0, spd);
    aR = lerp(aR, cpuR ? 1 : 0, spd);
    pAL = lerp(pAL, pL ? 1 : 0, spd);
    pAR = lerp(pAR, pR ? 1 : 0, spd);

    let charY = height * 0.6;
    drawHero(width * 0.28, charY, 'frieren', pAL, pAR, 1); 
    drawHero(width * 0.72, charY, 'fern', aL, aR, -1); 

    drawUI();
    if (gameState === 1) updateGame();
}

// ----------------- Aidn 风格积木函数 (稳如老狗) -----------------
function drawVoxelBlock(w, h, d, col, dir, hasFace, faceCol) {
    let c = color(col); fill(c); rect(0, 0, w, h); push();
    fill(red(c)*0.85, green(c)*0.85, blue(c)*0.85); beginShape();
    if (dir === 1) { vertex(w/2, -h/2); vertex(w/2 + d, -h/2 - d/2); vertex(w/2 + d, h/2 - d/2); vertex(w/2, h/2); } 
    else { vertex(-w/2, -h/2); vertex(-w/2 - d, -h/2 - d/2); vertex(-w/2 - d, h/2 - d/2); vertex(-w/2, h/2); }
    endShape(CLOSE);
    if (hasFace) {
        fill(faceCol); beginShape();
        if (dir === 1) { vertex(w/2+1, -h/2+2); vertex(w/2+d-2, -h/2-d/2+4); vertex(w/2+d-2, h/2-d/2-2); vertex(w/2+1, h/2-2); } 
        else { vertex(-w/2-1, -h/2+2); vertex(-w/2-d+2, -h/2-d/2+4); vertex(-w/2-d+2, h/2-d/2-2); vertex(-w/2-1, h/2-2); }
        endShape(CLOSE); fill(40);
        if (dir === 1) { rect(w/2 + d*0.4, -h/2 + 30, 6, 10); rect(w/2 + d*0.8, -h/2 + 25, 6, 10); } 
        else { rect(-w/2 - d*0.4, -h/2 + 30, 6, 10); rect(-w/2 - d*0.8, -h/2 + 25, 6, 10); }
    }
    pop();
}

function drawHero(x,y,t,l,r,d){let p=palette[t];push();translate(x,y);noStroke();fill(palette.shadow);ellipse(0,80,100,20);if(d===1)drawArm(25,25,r,palette.flagO,p.robe,false,d);else drawArm(-25,25,l,palette.flagY,p.robe,true,d);if(t==='fern')drawVoxelBlock(60,110,20,p.hair,d,false);drawVoxelBlock(40,60,20,p.robe,d,false);push();translate(0,-40);drawVoxelBlock(60,65,30,p.hair,d,true,p.skin);if(t==='frieren'){fill(p.hair);rect(-45,10,18,50);rect(45,10,18,50);fill(p.red);ellipse(-d*25,35,8,12)}pop();if(d===1)drawArm(-25,25,l,palette.flagY,p.robe,true,d);else drawArm(25,25,r,palette.flagO,p.robe,false,d);pop()}
function drawArm(ax,ay,v,f,r,il,bd){push();translate(ax,ay);rotate(lerp(0.3,-2.5,v));drawVoxelBlock(14,35,8,r,bd,false);fill(100);rect(0,-35,4,120);fill(f);if(il)rect(-25,-85,48,30);else rect(25,-85,48,30);pop()}

function drawUI() {
    textAlign(CENTER, CENTER);
    if (gameState === 0) {
        fill(0, 180); rect(width/2, height/2, width, height);
        fill(255); textSize(45); textStyle(BOLD); text("葬送的举旗", width/2, height*0.4);
        fill(palette.flagY); textSize(18); textStyle(NORMAL); text("BEST: " + bestScore, width/2, height*0.5);
        fill(255); rect(width/2, height*0.68, 160, 60, 30);
        fill(0); textSize(24); text("START", width/2, height*0.68);
    } else if (gameState === 1) {
        fill(50); textSize(80); textStyle(BOLD); text(score, width/2, height*0.22);
        let time = (timeLeft/60).toFixed(2);
        fill(timeLeft < 300 ? 'red' : 100); textSize(35); text("-" + time, width/2, 60);
        drawControl(width*0.25, height*0.88, palette.flagY, !pL);
        drawControl(width*0.75, height*0.88, palette.flagO, !pR);
    } else {
        fill(0, 200); rect(width/2, height/2, width, height);
        fill(255); textSize(55); textStyle(BOLD); text("TIME UP!", width/2, height*0.4);
        fill(palette.flagO); text("SCORE: " + score, width/2, height*0.55);
        text("TAP TO RETRY", width/2, height*0.85);
    }
}

function drawControl(x,y,c,p){push();translate(x,y);noFill();stroke(c);strokeWeight(4);ellipse(0,0,90,90);if(p){fill(c);noStroke();ellipse(0,0,70,70)}else{fill(c);noStroke();rect(0,0,30,30,5)}pop()}

function updateGame() {
    if (pL === cpuL && pR === cpuR) {
        score++;
        let next = floor(random(4));
        switch(next) {
            case 0: cpuL = false; cpuR = false; break;
            case 1: cpuL = true;  cpuR = false; break;
            case 2: cpuL = false; cpuR = true;  break;
            case 3: cpuL = true;  cpuR = true;  break;
        }
    }
    timeLeft--;
    if (timeLeft <= 0) {
        gameState = 2;
        if (score > bestScore) {
            bestScore = score;
            localStorage.setItem('frieren_player_v9', bestScore);
        }
    }
}

function mousePressed() {
    if (gameState !== 1) {
        gameState = 1;
        score = 0;
        timeLeft = 30 * 60;
        // 使用原生标签播放音乐，不会卡顿
        let audio = document.getElementById('game_bgm');
        audio.volume = 0.4;
        audio.play().catch(e => console.log("等待用户交互后播放"));
    }
}

function touchStarted() { mousePressed(); return false; }
function windowResized() { resizeCanvas(windowWidth, windowHeight); }
</script>
</body>
</html>
