<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>说谎的马卡龙 - 终极跳过排行榜版</title>
    <script src="https://cdn.jsdelivr.net/npm/hydrogen-js-sdk@2.2.3/dist/Bmob-2.2.3.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/addons/p5.sound.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.18.0/matter.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #FAFAFA; cursor: crosshair; touch-action: none; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;}
        #p5_loading { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #FAFAFA; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .loader { width: 40px; height: 40px; border: 3px solid #eee; border-top: 3px solid #FF0040; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #name-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; z-index: 10002; width: 260px; }
        #ninja-name-input { width: 90%; padding: 10px; margin: 15px 0; border: 2px solid #DDD; border-radius: 8px; font-size: 16px; text-align: center; }
        #confirm-name-btn { background: #FF0040; color: white; border: none; padding: 10px 30px; border-radius: 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="p5_loading"><div class="loader"></div></div>
    <div id="name-modal">
        <h3 style="margin:0">输入忍者代号</h3>
        <input type="text" id="ninja-name-input" placeholder="输入昵称..." maxlength="10">
        <button id="confirm-name-btn" onclick="savePlayerName()">确 定</button>
    </div>

<script>
// 初始化 Bmob
Bmob.initialize("13354dd487ffdd1009443fc2123a4fd5", "cec5e2a28058b73ca0b6731f12c9a36b");

const { Engine, World, Bodies, Composite } = Matter;
let engine, world, song, lyricsTimeline = [];
let fallingObjects = [];
let bladeTrail = []; 
let songReady = false, bgVideo, endVideo;
let gameState = 0; 
let score = 0, combo = 0, lives = 3, shakeTime = 0, freezeTime = 0;
let playerName = null; let globalLeaderboard = []; let isUploading = false;

function preload() {
    song = loadSound('makal.mp3', () => { songReady = true; });
    loadStrings('makal.lrc', (lines) => {
        lyricsTimeline = lines.map(line => {
            let m = line.match(/\[(\d+):(\d+\.\d+)\](.*)/);
            return m ? { start: parseInt(m[1])*60 + parseFloat(m[2]), text: m[3].trim() } : null;
        }).filter(x => x && x.text);
    });
}

function setup() {
    createCanvas(windowWidth, windowHeight);
    let savedName = localStorage.getItem('ninja_name');
    if (savedName) { playerName = savedName; } else { document.getElementById('name-modal').style.display = 'block'; }
    fetchGlobalLeaderboard();

    engine = Engine.create(); world = engine.world;
    engine.gravity.y = 0.9; // 增强重力手感

    bgVideo = createVideo(['bg.mp4']); bgVideo.hide(); bgVideo.elt.muted = true;
    endVideo = createVideo(['end.mp4']); endVideo.hide();

    // 核心抛射逻辑（昨天最爽的版本）
    setInterval(() => {
        if (gameState === 1) {
            let spawnCount = random() > 0.6 ? 2 : 1;
            for(let i=0; i<spawnCount; i++) {
                let time = song.isPlaying() ? song.currentTime() : 0;
                let cur = lyricsTimeline.find(l => time >= l.start && time <= l.start + 2.5);
                let char = cur ? random(cur.text.split("")) : "🎵";
                
                let type = "normal";
                let r = random(100);
                if (r < 5) type = "heart";
                else if (r < 15) type = "freeze";
                else if (r < 30) type = "trap";

                let body = Bodies.circle(random(80, width-80), height + 50, 35);
                Matter.Body.setVelocity(body, { x: random(-5, 5), y: random(-19, -26) });
                fallingObjects.push({ body: body, text: type==="trap"?"💣": (type==="freeze"?"❄️":(type==="heart"?"💖":char)), type: type, sliced: false, life: 255, size: 55 });
                Composite.add(world, body);
            }
        }
    }, 380);
}

function draw() {
    if (shakeTime > 0) { push(); translate(random(-15, 15), random(-15, 15)); shakeTime--; } else { push(); }

    if (gameState === 0) {
        background(250); textAlign(CENTER); fill(50);
        textSize(45); text("说谎的马卡龙", width/2, height/2 - 20);
        textSize(18); fill(150); text("ARCADE NINJA MODE\n- Swipe to Start -", width/2, height/2 + 60);
        pop(); return;
    }

    background(15);
    if (freezeTime > 0) { freezeTime--; engine.timing.timeScale = 0.35; tint(100, 220, 255); }
    else { engine.timing.timeScale = 1; noTint(); }

    if (bgVideo && bgVideo.elt.readyState > 2) image(bgVideo, 0, 0, width, height);
    Engine.update(engine);

    for (let i = fallingObjects.length-1; i>=0; i--) {
        let obj = fallingObjects[i]; let b = obj.body;
        push(); translate(b.position.x, b.position.y); rotate(b.angle); textAlign(CENTER, CENTER);
        
        if (obj.sliced) {
            fill(255, obj.life); textSize(obj.size); text(obj.text, 0, 0);
            obj.life -= 12; obj.size -= 0.8;
            if (obj.life <= 0) { fallingObjects.splice(i,1); World.remove(world, b); }
        } else {
            fill(obj.type==="trap"?"#000":"#FFF"); textSize(55); text(obj.text, 0, 0);
            if (b.position.y > height + 100 && b.velocity.y > 0) {
                if (obj.type === "normal") combo = 0;
                fallingObjects.splice(i,1); World.remove(world, b);
            }
        }
        pop();
    }

    if (mouseIsPressed) {
        bladeTrail.push({ x: mouseX, y: mouseY, life: 20 });
        for (let obj of fallingObjects) {
            if (!obj.sliced && dist(mouseX, mouseY, obj.body.position.x, obj.body.position.y) < 65) {
                obj.sliced = true;
                if (obj.type === "trap") { lives--; combo = 0; shakeTime = 30; if (lives <= 0) endGame(); }
                else if (obj.type === "freeze") { freezeTime = 180; score += 20; }
                else if (obj.type === "heart") { lives = min(lives+1, 5); score += 50; }
                else { combo++; score += 10 + (combo * 2); }
            }
        }
    }

    // 绘制刀光
    noFill(); stroke(255, 200);
    for (let i = 1; i < bladeTrail.length; i++) {
        strokeWeight(bladeTrail[i].life * 0.5);
        line(bladeTrail[i-1].x, bladeTrail[i-1].y, bladeTrail[i].x, bladeTrail[i].y);
        bladeTrail[i].life -= 2;
    }
    bladeTrail = bladeTrail.filter(p => p.life > 0);

    // 右上角跳过按钮
    drawSkipBtn();

    // 游戏 UI
    fill(255); textSize(24); textAlign(LEFT, TOP); text("SCORE: " + score, 20, 20);
    textAlign(RIGHT); text("💖".repeat(lives), width-20, 20);

    if (gameState === 2) drawRanking();
    pop();
}

function drawSkipBtn() {
    let bx = width-50, by = 80;
    fill(0, 100); noStroke(); ellipse(bx, by, 50, 50);
    fill(255); textAlign(CENTER, CENTER); textSize(20); text("⏭", bx, by);
    if (mouseIsPressed && dist(mouseX, mouseY, bx, by) < 30) endGame();
}

function endGame() {
    gameState = 2; song.stop(); bgVideo.stop();
    if (score > 0 && !isUploading) {
        isUploading = true;
        Bmob.Query('Leaderboard').set("name", playerName).set("score", score).save().then(() => {
            isUploading = false; fetchGlobalLeaderboard();
        }).catch(() => isUploading = false);
    }
    if (endVideo) { endVideo.time(0); endVideo.play(); }
}

function fetchGlobalLeaderboard() {
    Bmob.Query("Leaderboard").order("-score").limit(5).find().then(res => globalLeaderboard = res);
}

function drawRanking() {
    fill(0, 220); rect(width/2, height/2, width, height);
    fill(255); textAlign(CENTER); textSize(35); text("忍者榜单", width/2, height*0.25);
    for (let i = 0; i < globalLeaderboard.length; i++) {
        let entry = globalLeaderboard[i];
        fill(i===0?'#FFD700':'#FFF');
        text(`${i+1}. ${entry.name} : ${entry.score}`, width/2, height*0.38 + i*35);
    }
    fill(150); textSize(16); text("- Tap to Retry -", width/2, height*0.8);
}

function savePlayerName() {
    playerName = document.getElementById('ninja-name-input').value || "忍者";
    localStorage.setItem('ninja_name', playerName);
    document.getElementById('name-modal').style.display = 'none';
}

function mousePressed() {
    if (gameState === 0 && playerName) { gameState = 1; score = 0; lives = 3; song.play(); bgVideo.loop(); }
    else if (gameState === 2 && !isUploading) { resetGame(); }
}
function touchStarted() { mousePressed(); return false; }
function resetGame() { location.reload(); }
function windowResized() { resizeCanvas(windowWidth, windowHeight); }
</script>
</body>
</html>
