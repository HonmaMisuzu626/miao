<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>王小羊凑凑版</title>
    <script src="https://cdn.jsdelivr.net/npm/hydrogen-js-sdk@2.2.3/dist/Bmob-2.2.3.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/addons/p5.sound.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.18.0/matter.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #FAFAFA; cursor: crosshair; touch-action: none; font-family: sans-serif;}
        #p5_loading { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #FAFAFA; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .loader { width: 40px; height: 40px; border: 3px solid #eee; border-top: 3px solid #FF0040; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #name-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 50px rgba(0,0,0,0.2); text-align: center; z-index: 10000; width: 280px; }
        #ninja-name-input { width: 100%; padding: 12px; margin: 15px 0; border: 2px solid #EEE; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        #confirm-name-btn { background: #FF0040; color: white; border: none; padding: 10px 40px; border-radius: 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="p5_loading"><div class="loader"></div></div>
    <div id="name-modal">
        <h3 style="margin:0">设置忍者代号</h3>
        <input type="text" id="ninja-name-input" placeholder="请输入昵称..." maxlength="10">
        <button id="confirm-name-btn" onclick="savePlayerName()">确 定</button>
    </div>

<script>
// =======================================================
// ！！！在这里填入你的 Bmob 秘钥 ！！！
// =======================================================
Bmob.initialize("13354dd487ffdd1009443fc2123a4fd5", "cec5e2a28058b73ca0b6731f12c9a36b");

const { Engine, World, Bodies, Composite } = Matter;
let engine, world, song, lyricsTimeline = [];
let fallingObjects = [];
let bladeTrail = []; 
let songReady = false, bgVideo, endVideo;
let gameState = 0; 
let score = 0, combo = 0, lives = 3, freezeTime = 0, shakeTime = 0;
let playerName = null; 
let globalLeaderboard = []; 
let isUploading = false; 

function preload() {
    song = loadSound('makal.mp3', () => { songReady = true; });
    loadStrings('makal.lrc', (lines) => {
        lyricsTimeline = lines.map(line => {
            let m = line.match(/\[(\d+):(\d+\.\d+)\](.*)/);
            return m ? { start: parseInt(m[1])*60 + parseFloat(m[2]), text: m[3].trim() } : null;
        }).filter(x => x && x.text);
    });
}

function setup() {
    createCanvas(windowWidth, windowHeight);
    let savedName = localStorage.getItem('ninja_name');
    if (savedName) { playerName = savedName; } else { document.getElementById('name-modal').style.display = 'block'; }
    
    // 初始化时拉取一次榜单
    fetchGlobalLeaderboard();

    engine = Engine.create(); world = engine.world;
    engine.gravity.y = 0.8; 

    bgVideo = createVideo(['bg.mp4']); bgVideo.hide(); bgVideo.elt.muted = true;
    endVideo = createVideo(['end.mp4']); endVideo.hide();

    // 自动生成物体
    setInterval(() => {
        if (gameState === 1) spawnObject();
    }, 450);
}

function spawnObject() {
    let time = (songReady && song.isPlaying()) ? song.currentTime() : 0;
    let cur = lyricsTimeline.find(l => time >= l.start && time <= l.start + 2.5);
    let char = cur ? random(cur.text.split("")) : "🎵";
    let type = random() < 0.1 ? "trap" : (random() < 0.05 ? "heart" : "normal");
    
    let body = Bodies.circle(random(50, width-50), height + 40, 25);
    Matter.Body.setVelocity(body, { x: random(-3, 3), y: random(-18, -24) });
    
    fallingObjects.push({ body: body, text: type==="trap"?"💣":char, type: type, sliced: false, life: 255 });
    Composite.add(world, body);
}

function draw() {
    if (shakeTime > 0) { translate(random(-10, 10), random(-10, 10)); shakeTime--; }
    
    if (gameState === 0) {
        background('#FAFAFA');
        textAlign(CENTER); fill(50); textSize(40); text("说谎的马卡龙", width/2, height/2);
        fill(150); textSize(16); text("- 点击屏幕开始 -", width/2, height/2 + 60);
        return;
    }

    background(15);
    if (freezeTime > 0) { freezeTime--; engine.timing.timeScale = 0.3; tint(100, 200, 255); }
    else { engine.timing.timeScale = 1; noTint(); }

    if (bgVideo && bgVideo.width > 0) image(bgVideo, 0, 0, width, height);
    Engine.update(engine);

    // 绘制与切割判定
    drawAndCheckSlice();

    // UI
    fill(255); textSize(24); textAlign(LEFT); text("SCORE: " + score, 20, 40);
    textAlign(RIGHT); text("LIVES: " + "💖".repeat(lives), width-20, 40);

    if (gameState === 2) drawLeaderboard();
}

function drawAndCheckSlice() {
    for (let i = fallingObjects.length-1; i>=0; i--) {
        let obj = fallingObjects[i];
        let b = obj.body;
        
        push(); translate(b.position.x, b.position.y); rotate(b.angle);
        fill(obj.type==="trap"?0:255); textSize(40); text(obj.text, 0, 0); pop();

        if (!obj.sliced && mouseIsPressed) {
            if (dist(mouseX, mouseY, b.position.x, b.position.y) < 40) {
                obj.sliced = true;
                if (obj.type === "trap") { lives--; shakeTime=20; if(lives<=0) endGame(); }
                else { score += 10; combo++; }
            }
        }
        if (b.position.y > height + 100) { fallingObjects.splice(i, 1); World.remove(world, b); }
    }
}

function endGame() {
    gameState = 2;
    if (songReady) song.stop();
    if (score > 0 && !isUploading) {
        isUploading = true;
        console.log("准备上传分数...");
        const query = Bmob.Query('Leaderboard');
        query.set("name", playerName || "匿名忍者");
        query.set("score", score);
        // 强制开启全员可读权限
        query.save().then(res => {
            console.log("上传成功！");
            isUploading = false;
            fetchGlobalLeaderboard();
        }).catch(err => {
            console.error("上传失败:", err);
            isUploading = false;
        });
    }
}

function fetchGlobalLeaderboard() {
    console.log("正在获取全球榜单...");
    const query = Bmob.Query("Leaderboard");
    query.order("-score");
    query.limit(5);
    query.find().then(res => {
        globalLeaderboard = res;
        console.log("榜单获取成功，条数：", res.length);
    }).catch(err => {
        console.error("榜单获取失败（可能是权限ACL问题）:", err);
        globalLeaderboard = [{name: "数据拉取失败", score: 0}];
    });
}

function drawLeaderboard() {
    fill(0, 180); rect(width/2, height/2, width, height);
    fill(255); textAlign(CENTER); textSize(40); text("GAME OVER", width/2, height*0.25);
    textSize(22); text("--- 全球前五 ---", width/2, height*0.35);
    
    if (globalLeaderboard.length === 0) {
        text("正在连接服务器...", width/2, height*0.45);
    } else {
        for (let i = 0; i < globalLeaderboard.length; i++) {
            let item = globalLeaderboard[i];
            text(`${i+1}. ${item.name} : ${item.score}`, width/2, height*0.45 + i*30);
        }
    }
    text("点击屏幕重试", width/2, height*0.85);
}

function savePlayerName() {
    playerName = document.getElementById('ninja-name-input').value || "无名";
    localStorage.setItem('ninja_name', playerName);
    document.getElementById('name-modal').style.display = 'none';
}

function mousePressed() {
    if (gameState === 0 && playerName) { gameState = 1; if(songReady) song.play(); if(bgVideo) bgVideo.loop(); }
    else if (gameState === 2 && !isUploading) { location.reload(); }
}
function touchStarted() { mousePressed(); return false; }
function windowResized() { resizeCanvas(windowWidth, windowHeight); }
</script>
</body>
</html>
