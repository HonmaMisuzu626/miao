<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>说谎的马卡龙 - 极速加载版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/addons/p5.sound.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.18.0/matter.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #FAFAFA; cursor: crosshair; touch-action: none; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;}
        
        /* ================= 极简呼吸加载屏 ================= */
        #p5_loading {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #FAFAFA; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
        }
        .loader {
            width: 40px; height: 40px; border: 3px solid #eee;
            border-top: 3px solid #FF0040; border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-text { color: #888; font-size: 16px; letter-spacing: 2px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
    </style>
</head>
<body>

    <div id="p5_loading">
        <div class="loader"></div>
        <div class="loading-text">NOW LOADING...</div>
    </div>

<script>
const { Engine, World, Bodies, Composite } = Matter;
let engine, world, song, lyricsTimeline = [];
let fallingObjects = [], staticLines = [], currentLine = [];
let songReady = false, bgVideo, endVideo;
let gameState = 0; 

const colors = ['#FF0040', '#FFB7B2', '#FFFFFF', '#B5EAD7'];

function preload() {
    song = loadSound('makal.mp3', () => { songReady = true; }, () => console.log("找不到音乐"));
    loadStrings('makal.lrc', (lines) => {
        lyricsTimeline = lines.map(line => {
            let m = line.match(/\[(\d+):(\d+\.\d+)\](.*)/);
            return m ? { start: parseInt(m[1])*60 + parseFloat(m[2]), text: m[3].trim() } : null;
        }).filter(x => x && x.text);
    });
}

function setup() {
    createCanvas(windowWidth, windowHeight);
    pixelDensity(1); 
    frameRate(60);   

    engine = Engine.create();
    world = engine.world;
    engine.gravity.y = 0.5;

    bgVideo = createVideo(['bg.mp4'], () => { bgVideo.elt.onended = () => endGame(); });
    bgVideo.hide(); bgVideo.volume(0);
    bgVideo.elt.muted = true; 
    bgVideo.elt.setAttribute('playsinline', 'true'); 
    bgVideo.elt.setAttribute('webkit-playsinline', 'true'); 
    // 【安卓提速核心】：禁止视频在开始前全量预加载，只加载一点点元数据
    bgVideo.elt.setAttribute('preload', 'metadata');

    endVideo = createVideo(['end.mp4']);
    endVideo.hide(); endVideo.volume(1); 
    endVideo.elt.setAttribute('playsinline', 'true'); 
    endVideo.elt.setAttribute('webkit-playsinline', 'true');
    // 【安卓提速核心】：片尾视频更不需要提前下载，直接设置 lazy
    endVideo.elt.setAttribute('preload', 'none');

    textFont('"Helvetica Neue", Helvetica, Arial, sans-serif');

    setInterval(() => {
        if (gameState === 1) {
            let time = (songReady && song.isPlaying()) ? song.currentTime() : (millis() / 1000 % 30);
            let cur = lyricsTimeline.find(l => time >= l.start && time <= l.start + 2.5);
            let char = cur ? random(cur.text.split("")) : random(["★", "●", "🌀", "🥖", "✕"]);
            
            let body = Bodies.circle(random(50, width-50), -50, 25, { restitution: 0.7, friction: 0.1 });
            fallingObjects.push({ body: body, text: char, color: random(colors) });
            Composite.add(world, body);

            if (fallingObjects.length > 60) {
                let oldest = fallingObjects.shift();
                World.remove(world, oldest.body);
            }
        }
    }, 200); 
}

function draw() {
    if (gameState === 0) {
        background('#FAFAFA'); 
        fill('#333333'); textAlign(CENTER, CENTER);
        textSize(min(width*0.08, 55)); textStyle(NORMAL); 
        text("嘘つきは馬鹿に効く", width/2, height/2 - 40);
        textSize(min(width*0.04, 20)); fill('#888888'); 
        text("feat. Kasane Teto", width/2, height/2 + 30);
        let alpha = map(sin(frameCount * 0.05), -1, 1, 50, 200);
        fill(150, 150, 150, alpha); textSize(min(width*0.03, 16)); letterSpacing = 2; 
        text("- Click to Start -", width/2, height/2 + 120);
        return; 
    }

    if (gameState === 1) {
        background(15); 
        if (bgVideo && bgVideo.width > 0) {
            push(); tint(255, 120); 
            let scale = Math.max(width / bgVideo.width, height / bgVideo.height);
            imageMode(CENTER);
            image(bgVideo, width/2, height/2, bgVideo.width * scale, bgVideo.height * scale);
            pop();
        }

        Engine.update(engine);

        for (let i = fallingObjects.length-1; i>=0; i--) {
            let obj = fallingObjects[i];
            let b = obj.body;
            push();
            translate(b.position.x, b.position.y); rotate(b.angle);
            textAlign(CENTER, CENTER);
            fill(obj.color); textSize(36); textStyle(BOLD); text(obj.text, 0, 0);
            pop();
            if (b.position.y > height+100) { World.remove(world, b); fallingObjects.splice(i,1); }
        }

        strokeWeight(6);
        for (let i = staticLines.length-1; i>=0; i--) {
            let l = staticLines[i];
            l.life -= 3; 
            if (l.life <= 0) {
                for (let b of l.bodies) World.remove(world, b);
                staticLines.splice(i, 1);
            } else {
                stroke(255, 0, 64, l.life);
                for (let j = 0; j < l.pts.length - 1; j++) {
                    line(l.pts[j].x, l.pts[j].y, l.pts[j+1].x, l.pts[j+1].y);
                }
            }
        }

        if (mouseIsPressed) {
            let p = { x: mouseX, y: mouseY };
            if (currentLine.length === 0 || dist(currentLine[currentLine.length - 1].x, currentLine[currentLine.length - 1].y, p.x, p.y) > 15) {
                currentLine.push(p);
            }
            stroke(255); noFill();
            beginShape();
            for (let pt of currentLine) vertex(pt.x, pt.y);
            endShape();
        }

        drawSkipButton();
    }

    if (gameState === 2) {
        background(15);
        if (endVideo && endVideo.width > 0) {
            push(); tint(255, 200); 
            let scale = Math.max(width / endVideo.width, height / endVideo.height);
            imageMode(CENTER);
            image(endVideo, width/2, height/2, endVideo.width * scale, endVideo.height * scale);
            pop();
        }
        fill(255); textAlign(CENTER, CENTER);
        drawingContext.shadowBlur = 8; drawingContext.shadowColor = 'rgba(0,0,0,0.8)';
        textSize(min(width*0.1, 65)); textStyle(BOLD); fill('#FFFFFF'); 
        text("CLEAR", width/2, height/2 - 50);
        textSize(min(width*0.04, 22)); fill(220); textStyle(NORMAL);
        text("Thank you for playing.", width/2, height/2 + 30);
        let alpha = map(sin(frameCount * 0.05), -1, 1, 50, 255);
        fill(255, 255, 255, alpha); textSize(min(width*0.03, 16));
        text("- Click to Retry -", width/2, height/2 + 110);
        drawingContext.shadowBlur = 0;
    }
}

function drawSkipButton() {
    let btnX = width - 40; let btnY = 40; let btnSize = 50;      
    push(); fill(0, 0, 0, 80); noStroke(); circle(btnX, btnY, btnSize);
    let iconScale = 1 + sin(frameCount * 0.1) * 0.1;
    translate(btnX, btnY); scale(iconScale); textAlign(CENTER, CENTER);
    textSize(22); text("⏭", 0, 0); pop();
}

function mousePressed() {
    if (gameState === 0) {
        gameState = 1;
        if (songReady) song.play();
        if (bgVideo) bgVideo.play(); 
    } 
    else if (gameState === 1) {
        if (dist(mouseX, mouseY, width - 40, 40) < 60) { endGame(); return; }
        currentLine = [];
    } 
    else if (gameState === 2) { resetGame(); }
}

function mouseReleased() {
    if (gameState === 1 && currentLine.length > 1) {
        let createdBodies = [];
        for(let i = 0; i < currentLine.length - 1; i++) {
            let p1 = currentLine[i];
            let p2 = currentLine[i+1];
            let d = dist(p1.x, p1.y, p2.x, p2.y);
            let segment = Bodies.rectangle((p1.x+p2.x)/2, (p1.y+p2.y)/2, d, 8, { isStatic: true, angle: atan2(p2.y-p1.y, p2.x-p1.x) });
            Composite.add(world, segment);
            createdBodies.push(segment);
        }
        staticLines.push({ pts: [...currentLine], bodies: createdBodies, life: 255 });
    }
    currentLine = [];
}

function touchMoved() { return false; }

function endGame() {
    gameState = 2;
    if (songReady && song.isPlaying()) song.stop();
    if (bgVideo) bgVideo.stop();   
    if (endVideo) { 
        endVideo.time(0); 
        endVideo.play(); 
    }
}

function resetGame() {
    for (let obj of fallingObjects) World.remove(world, obj.body);
    for (let l of staticLines) { for (let b of l.bodies) World.remove(world, b); }
    fallingObjects = []; staticLines = []; currentLine = [];
    if (bgVideo) bgVideo.time(0);
    if (endVideo) endVideo.stop(); 
    gameState = 0; 
}

function windowResized() { resizeCanvas(windowWidth, windowHeight); }
</script>
</body>
</html>
