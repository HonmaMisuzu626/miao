<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>王小羊大笨蛋</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; touch-action: none; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; font-family: sans-serif; pointer-events: none; z-index: 10; text-shadow: 0 0 5px #00ffff; }
        #scoreboard { position: absolute; top: 20px; right: 20px; color: #fff; font-size: 24px; font-family: monospace; z-index: 10; }
    </style>
</head>
<body>
    <div id="ui"><h1>一般攻击魔法</h1><p>360°指向 | 点击释放动作</p></div>
    <div id="scoreboard">SCORE: <span id="scoreVal">0</span></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        let score = 0, mixer, actions = {};
        const clock = new THREE.Clock();
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x050505, 10, 60);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 10, 25);
        camera.lookAt(0, 4, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.2));
        const dirLight = new THREE.DirectionalLight(0x00ffff, 1.5);
        dirLight.position.set(5, 15, 10);
        scene.add(dirLight);

        // 雪花系统
        const snowCount = 400;
        const snowGeo = new THREE.BufferGeometry();
        const snowPos = new Float32Array(snowCount * 3);
        for(let i=0; i<snowCount*3; i++) snowPos[i] = (Math.random()-0.5)*60;
        snowGeo.setAttribute('position', new THREE.BufferAttribute(snowPos, 3));
        const snowSystem = new THREE.Points(snowGeo, new THREE.PointsMaterial({color:0xffffff, size:0.12, transparent:true, opacity:0.8}));
        scene.add(snowSystem);

        const playerGroup = new THREE.Group();
        scene.add(playerGroup);

        const loader = new THREE.GLTFLoader();
        // 🌟 只加载这一个合并了所有动作的文件
        loader.load('models/character.glb', (gltf) => {
            const model = gltf.scene;
            
            // 自动缩放与居中修正
            const box = new THREE.Box3().setFromObject(model);
            const size = box.getSize(new THREE.Vector3());
            const center = box.getCenter(new THREE.Vector3());
            model.position.x -= center.x;
            model.position.y -= center.y;
            model.position.z -= center.z;
            const s = 10 / (size.y || 1); 
            model.scale.set(s, s, s);
            
            playerGroup.add(model);
            mixer = new THREE.AnimationMixer(model);

            // 识别所有动作
            gltf.animations.forEach(clip => {
                actions[clip.name] = mixer.clipAction(clip);
                console.log("识别到动作:", clip.name);
            });

            // 默认播放 idle 或者第一个动作
            if (actions['idle']) actions['idle'].play();
            else if (gltf.animations[0]) actions[gltf.animations[0].name].play();

        }, undefined, (err) => console.error("模型加载失败，请检查 models/character.glb", err));

        // 360度指向
        function aim(x, y) {
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            const angle = Math.atan2(x - centerX, y - centerY);
            playerGroup.rotation.y = angle + Math.PI; 
        }

        window.addEventListener('pointermove', (e) => aim(e.clientX, e.clientY));

        // 点击触发
        window.addEventListener('pointerdown', (e) => {
            aim(e.clientX, e.clientY);
            // 🌟 这里的名字要和你在 Blender NLA 里起的名字对应
            const attackAct = actions['attack'] || actions['Armature动作']; 
            const idleAct = actions['idle'];

            if (attackAct) {
                if (idleAct) idleAct.fadeOut(0.1);
                attackAct.reset().fadeIn(0.1).setLoop(THREE.LoopOnce).play();
                attackAct.clampWhenFinished = true;

                const onFinish = (event) => {
                    if (event.action === attackAct && idleAct) {
                        idleAct.reset().fadeIn(0.4).play();
                        mixer.removeEventListener('finished', onFinish);
                    }
                };
                mixer.addEventListener('finished', onFinish);
            }

            dirLight.intensity = 5;
            setTimeout(() => dirLight.intensity = 1.5, 120);
            checkHit();
        });

        const boxes = [];
        class Box {
            constructor() {
                this.mesh = new THREE.Mesh(new THREE.BoxGeometry(2, 6, 2), new THREE.MeshLambertMaterial({color: 0x00ccff}));
                this.degree = Math.floor(Math.random() * 8) * 45;
                const r = this.degree * (Math.PI / 180);
                this.mesh.position.set(Math.sin(r) * 12, 45, Math.cos(r) * 12);
                scene.add(this.mesh);
                this.active = true;
                this.speed = 5 + Math.random() * 5;
            }
            update(dt) {
                this.mesh.position.y -= this.speed * dt;
                if (this.mesh.position.y < -5) this.kill();
            }
            explode() {
                for(let i=0; i<6; i++) {
                    const shard = new THREE.Mesh(new THREE.BoxGeometry(0.5,0.5,0.5), new THREE.MeshLambertMaterial({color:0x00ffff}));
                    shard.position.copy(this.mesh.position);
                    scene.add(shard);
                    const v = new THREE.Vector3((Math.random()-0.5)*15, (Math.random()-0.5)*15, (Math.random()-0.5)*15);
                    const t = setInterval(() => {
                        shard.position.addScaledVector(v, 0.02);
                        shard.scale.multiplyScalar(0.9);
                        if(shard.scale.x < 0.1) { scene.remove(shard); clearInterval(t); }
                    }, 16);
                }
                this.kill();
            }
            kill() { this.active = false; scene.remove(this.mesh); }
        }

        function checkHit() {
            let pRot = playerGroup.rotation.y % (Math.PI * 2);
            if (pRot < 0) pRot += Math.PI * 2;
            boxes.forEach(b => {
                if (b.active && b.mesh.position.y > 0 && b.mesh.position.y < 12) {
                    const boxRad = b.degree * (Math.PI / 180);
                    let diff = Math.abs(pRot - boxRad);
                    if (diff > Math.PI) diff = Math.PI * 2 - diff;
                    if (diff < 0.6) { 
                        b.explode();
                        score += 100;
                        document.getElementById('scoreVal').innerText = score;
                    }
                }
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();
            if (mixer) mixer.update(dt);
            
            const sPos = snowGeo.attributes.position.array;
            for(let i=1; i<snowCount*3; i+=3) {
                sPos[i] -= 3 * dt;
                if(sPos[i] < -5) sPos[i] = 30;
            }
            snowGeo.attributes.position.needsUpdate = true;

            if (Math.random() < 0.03) boxes.push(new Box());
            for(let i=boxes.length-1; i>=0; i--) {
                boxes[i].update(dt);
                if(!boxes[i].active) boxes.splice(i, 1);
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
