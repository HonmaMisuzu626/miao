<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>王小羊大笨蛋</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: "Helvetica Neue", sans-serif; touch-action: none; }
        canvas { display: block; }

        /* aidn 风格开始界面 */
        #start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 500; cursor: pointer;
        }
        #start-screen h1 { color: #00ffff; font-weight: 100; letter-spacing: 10px; font-size: 40px; }
        #start-screen p { color: #fff; opacity: 0.4; letter-spacing: 2px; font-size: 12px; margin-top: 20px; }

        /* UI 元素 */
        .ui-text { position: absolute; color: #00ffff; font-size: 12px; letter-spacing: 2px; pointer-events: none; z-index: 100; }
        #timer { top: 30px; left: 30px; border-left: 1px solid #00ffff; padding-left: 10px; }
        #score { top: 55px; left: 30px; border-left: 1px solid #00ffff; padding-left: 10px; opacity: 0.6; }
        
        #exit-btn {
            position: absolute; top: 30px; right: 30px; background: none; border: 1px solid #00ffff;
            color: #00ffff; padding: 5px 15px; font-size: 10px; cursor: pointer; z-index: 100; transition: 0.3s;
        }
        #exit-btn:hover { background: #00ffff; color: #000; }

        /* 结束界面 */
        #game-over {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 600;
        }
        #game-over h2 { color: #00ffff; font-weight: 100; font-size: 50px; margin: 0; }
        #game-over p { color: #fff; opacity: 0.5; margin: 20px 0 40px 0; }
        .retry-btn { background: #00ffff; color: #000; border: none; padding: 12px 50px; cursor: pointer; font-size: 12px; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div id="start-screen" onclick="startGame()">
        <h1>一般攻击魔法</h1>
        <p>TAP TO START</p>
    </div>

    <div id="timer" class="ui-text">TIME / 60</div>
    <div id="score" class="ui-text">SCORE / 0</div>
    <button id="exit-btn" onclick="window.location.href='../index.html'">EXIT</button>

    <div id="game-over">
        <h2>FINISH</h2>
        <p>SCORE / <span id="final-score">0</span></p>
        <button class="retry-btn" onclick="location.reload()">RETRY</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        let score = 0, timeLeft = 60, isGameOver = false, gameStarted = false;
        let mixer, actions = {};
        const clock = new THREE.Clock();

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            gameStarted = true;
            startTimer();
        }

        // --- 场景基础 ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 10, 25);
        camera.lookAt(0, 4, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.0));
        const dirLight = new THREE.DirectionalLight(0x00ffff, 1.5);
        dirLight.position.set(5, 15, 10);
        scene.add(dirLight);

        // 雪花
        const snowCount = 300;
        const snowGeo = new THREE.BufferGeometry();
        const snowPos = new Float32Array(snowCount * 3);
        for(let i=0; i<snowCount*3; i++) snowPos[i] = (Math.random()-0.5)*60;
        snowGeo.setAttribute('position', new THREE.BufferAttribute(snowPos, 3));
        const snow = new THREE.Points(snowGeo, new THREE.PointsMaterial({color:0xffffff, size:0.08, transparent:true, opacity:0.4}));
        scene.add(snow);

        const playerGroup = new THREE.Group();
        scene.add(playerGroup);

        // 模型加载
        const loader = new THREE.GLTFLoader();
        loader.load('models/character.glb', (gltf) => {
            const model = gltf.scene;
            const box = new THREE.Box3().setFromObject(model);
            const size = box.getSize(new THREE.Vector3());
            const center = box.getCenter(new THREE.Vector3());
            model.position.set(-center.x, -center.y, -center.z);
            model.scale.setScalar(10 / (size.y || 1));
            playerGroup.add(model);

            mixer = new THREE.AnimationMixer(model);
            gltf.animations.forEach(clip => { actions[clip.name] = mixer.clipAction(clip); });
            if (actions['idle']) actions['idle'].play();
        });

        // --- 核心：极速平移转向逻辑 (适配 PC 和 手机) ---
        let isPointerDown = false;
        let lastX = 0;
        const sensitivity = 0.008; // 🌟 这里调节灵敏度，数值越大转越快

        function onPointerDown(x) {
            if (!gameStarted || isGameOver) return;
            isPointerDown = true;
            lastX = x;
        }

        function onPointerMove(x) {
            if (!isPointerDown) return;
            const deltaX = x - lastX;
            // 🌟 左右平移带动 360 度旋转
            playerGroup.rotation.y += deltaX * sensitivity;
            lastX = x;
        }

        function onPointerUp() {
            if (!isPointerDown) return;
            isPointerDown = false;
            triggerAttack();
        }

        // PC 鼠标事件
        window.addEventListener('mousedown', (e) => onPointerDown(e.clientX));
        window.addEventListener('mousemove', (e) => onPointerMove(e.clientX));
        window.addEventListener('mouseup', onPointerUp);

        // 手机触屏事件
        window.addEventListener('touchstart', (e) => onPointerDown(e.touches[0].clientX));
        window.addEventListener('touchmove', (e) => onPointerMove(e.touches[0].clientX));
        window.addEventListener('touchend', onPointerUp);

        function triggerAttack() {
            const attackAct = actions['attack'] || actions['Armature动作'];
            if (attackAct) {
                if (actions['idle']) actions['idle'].fadeOut(0.1);
                attackAct.reset().fadeIn(0.1).setLoop(THREE.LoopOnce).play();
                attackAct.clampWhenFinished = true;
                mixer.addEventListener('finished', function restore(event) {
                    if (event.action === attackAct && actions['idle']) {
                        actions['idle'].reset().fadeIn(0.4).play();
                        mixer.removeEventListener('finished', restore);
                    }
                });
            }
            dirLight.intensity = 5;
            setTimeout(() => dirLight.intensity = 1.5, 120);
            checkHit();
        }

        // --- 实体方块与碰撞 ---
        const boxes = [];
        class Box {
            constructor() {
                // 🌟 实体方块：使用 MeshLambertMaterial
                this.mesh = new THREE.Mesh(
                    new THREE.BoxGeometry(2, 6, 2), 
                    new THREE.MeshLambertMaterial({color: 0x00ffff})
                );
                this.degree = Math.floor(Math.random() * 8) * 45;
                const r = this.degree * (Math.PI / 180);
                this.mesh.position.set(Math.sin(r) * 12, 45, Math.cos(r) * 12);
                scene.add(this.mesh);
                this.active = true;
                this.speed = 6 + Math.random() * 4;
            }
            update(dt) {
                this.mesh.position.y -= this.speed * dt;
                if (this.mesh.position.y < -5) this.kill();
            }
            explode() {
                // 🌟 击中碎裂效果
                for(let i=0; i<6; i++) {
                    const shard = new THREE.Mesh(new THREE.BoxGeometry(0.5,0.5,0.5), new THREE.MeshLambertMaterial({color:0x00ffff}));
                    shard.position.copy(this.mesh.position);
                    scene.add(shard);
                    const v = new THREE.Vector3((Math.random()-0.5)*15, (Math.random()-0.5)*15, (Math.random()-0.5)*15);
                    const t = setInterval(() => {
                        shard.position.addScaledVector(v, 0.02);
                        shard.scale.multiplyScalar(0.9);
                        if(shard.scale.x < 0.1) { scene.remove(shard); clearInterval(t); }
                    }, 16);
                }
                this.kill();
                score += 100;
                document.getElementById('score').innerText = "SCORE / " + score;
            }
            kill() { this.active = false; scene.remove(this.mesh); }
        }

        function checkHit() {
            let pRot = playerGroup.rotation.y % (Math.PI * 2);
            if (pRot < 0) pRot += Math.PI * 2;
            boxes.forEach(b => {
                if (b.active && b.mesh.position.y > 0 && b.mesh.position.y < 15) {
                    const boxRad = b.degree * (Math.PI / 180);
                    let diff = Math.abs(pRot - boxRad);
                    if (diff > Math.PI) diff = Math.PI * 2 - diff;
                    if (diff < 0.7) b.explode();
                }
            });
        }

        function startTimer() {
            const timerInterval = setInterval(() => {
                if(isGameOver) return;
                timeLeft--;
                document.getElementById('timer').innerText = "TIME / " + timeLeft;
                if(timeLeft <= 0) {
                    isGameOver = true;
                    clearInterval(timerInterval);
                    document.getElementById('game-over').style.display = 'flex';
                    document.getElementById('final-score').innerText = score;
                }
            }, 1000);
        }

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();
            if (mixer) mixer.update(dt);
            
            const sPos = snow.geometry.attributes.position.array;
            for(let i=1; i<snowCount*3; i+=3) {
                sPos[i] -= 4 * dt;
                if(sPos[i] < -5) sPos[i] = 30;
            }
            snow.geometry.attributes.position.needsUpdate = true;

            if (gameStarted && !isGameOver && Math.random() < 0.04) boxes.push(new Box());
            for(let i=boxes.length-1; i>=0; i--) {
                boxes[i].update(dt);
                if(!boxes[i].active) boxes.splice(i, 1);
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
